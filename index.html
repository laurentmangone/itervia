<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Itervia</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      window.onerror = function(msg, url, line, col, error) {
        document.getElementById('root').innerHTML = '<pre style="color:red;padding:20px;font-size:14px;">ERROR: ' + msg + '\nURL: ' + url + '\nLine: ' + line + ':' + col + '\n' + (error && error.stack || '') + '</pre>';
      };
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
